# AlphaDivision — Non-secret configuration
# Secrets (API keys, passwords, webhook URLs) belong in .env

log_level     = "INFO"
watchlist     = ["AAPL", "MSFT", "GOOGL",
  "CRWD", "SNOW", "DDOG", "SHOP", "MELI", "COIN", "UBER", "AXON",
  "PLTR", "AI", "BBAI", "SOUN", "IONQ", "RXRX", "GTLB", "PATH",
  "S", "CPNG", "MRVL", "MPWR", "WOLF", "SITM", "ONTO", "ALAB",
  "SMCI", "SNDK",
]
paper_balance = 100000.0   # Starting account balance for portfolio value chart

[analysis]
ai_provider  = "claude"           # "claude" | "gemini"
claude_model = "claude-haiku-4-5"
gemini_model = "gemini-2.0-flash"

[ml]
symbols = [
  "CRWD", "SNOW", "DDOG", "SHOP", "MELI", "COIN", "UBER", "AXON",
  "PLTR", "AI", "BBAI", "SOUN", "IONQ", "RXRX", "GTLB", "PATH",
  "S", "CPNG", "MRVL", "MPWR", "WOLF", "SITM", "ONTO", "ALAB",
  "SMCI", "SNDK",
]
lookback_days_momentum = 365
lookback_days_regime   = 1825
max_strategies_per_run = 5
min_forward_return_pct = 1.5
min_examples           = 30
min_win_rate_pct       = 45.0
cron_schedule          = "0 2 * * *"
codegen_provider       = "claude"
codegen_model          = "claude-sonnet-4-5"

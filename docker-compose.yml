services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: alphadivision
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d alphadivision"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  data:
    build: ./services/data
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: data
      CONFIG_FILE: /etc/alphadivision/config.toml
    volumes:
      - ./services/data:/app
      - ./shared:/app/shared
      - ./config.toml:/etc/alphadivision/config.toml:ro
      - logs:/var/log/alphadivision

  analysis:
    build: ./services/analysis
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: analysis
      CONFIG_FILE: /etc/alphadivision/config.toml
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./services/analysis:/app
      - ./shared:/app/shared
      - ./config.toml:/etc/alphadivision/config.toml:ro
      - logs:/var/log/alphadivision

  execution:
    build: ./services/execution
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: execution
      CONFIG_FILE: /etc/alphadivision/config.toml
    volumes:
      - ./services/execution:/app
      - ./shared:/app/shared
      - ./config.toml:/etc/alphadivision/config.toml:ro
      - logs:/var/log/alphadivision

  alerts:
    build: ./services/alerts
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: alerts
      CONFIG_FILE: /etc/alphadivision/config.toml
    volumes:
      - ./services/alerts:/app
      - ./shared:/app/shared
      - ./config.toml:/etc/alphadivision/config.toml:ro
      - logs:/var/log/alphadivision

  dashboard:
    build: ./services/dashboard
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: dashboard
      CONFIG_FILE: /etc/alphadivision/config.toml
    ports:
      - "8080:8080"
    volumes:
      - ./services/dashboard:/app
      - ./shared:/app/shared
      - ./config.toml:/etc/alphadivision/config.toml:ro
      - logs:/var/log/alphadivision

  research:
    build: ./services/research
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: research
      CONFIG_FILE: /etc/alphadivision/config.toml
    ports:
      - "8081:8081"
    volumes:
      - ./services/research:/app
      - ./shared:/app/shared
      - ./config.toml:/etc/alphadivision/config.toml:ro
      - logs:/var/log/alphadivision

  ml:
    build: ./services/ml
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      research:
        condition: service_started
    env_file: .env
    environment:
      SERVICE_NAME: ml
      CONFIG_FILE: /etc/alphadivision/config.toml
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./services/ml:/app
      - ./shared:/app/shared
      - ./config.toml:/etc/alphadivision/config.toml:ro
      - logs:/var/log/alphadivision

volumes:
  postgres_data:
  redis_data:
  logs:
